<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Granted 🚗</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #000428, #004e92);
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      overflow: hidden;
    }

    .pulse {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(0,255,255,0.2) 0%, transparent 80%);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(0.9); opacity: 0.4; }
    }

    .access-container {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 3.5em;
      letter-spacing: 2px;
      text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
      to { text-shadow: 0 0 25px #00e6e6, 0 0 50px #00ffff; }
    }

    .sub {
      color: white;
      font-size: 1.2em;
      opacity: 0.8;
      margin-top: 10px;
      animation: fadein 3s ease-in-out infinite alternate;
    }

    @keyframes fadein {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* 🚗 Car animation */
    .car {
      position: absolute;
      bottom: 50px;
      left: -200px;
      font-size: 3.5em;
      animation: drive 3s ease-in-out forwards;
    }

    @keyframes drive {
      0% { left: -200px; transform: rotateY(0deg); }
      50% { left: 50%; transform: scale(1.2); }
      100% { left: 110%; opacity: 0; }
    }

    /* 🧱 Gate animation */
    .gate {
      position: absolute;
      width: 120px;
      height: 250px;
      top: 30%;
      right: 30%;
      background: rgba(255,255,255,0.1);
      border: 3px solid #00ffff;
      border-radius: 10px;
      box-shadow: 0 0 25px #00ffff;
      animation: gateOpen 3s ease forwards;
      transform-origin: right center;
    }

    @keyframes gateOpen {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(75deg); opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="pulse"></div>

  <div class="access-container">
    <h1>ACCESS GRANTED ✅</h1>
    <div class="sub">Welcome to Smart Parking System</div>
  </div>

  <!-- 🚗 Car + Gate -->
  <div class="car">🚗</div>
  <div class="gate"></div>

  <script>
  // Futuristic access sound (plays immediately)
  const accessSound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  accessSound.volume = 0.5;
  accessSound.play();

  // Garage door / whoosh sound (plays after car moves halfway)
  const whooshSound = new Audio("https://actions.google.com/sounds/v1/doors/door_swoosh_fast.ogg");
  whooshSound.volume = 0.6;
  setTimeout(() => {
    whooshSound.play();
  }, 1500);  // plays at mid-animation

  // Redirect to dashboard after animation completes
  setTimeout(() => {
    window.location.href = "/dashboard";
  }, 3200);
</script>
</body>
</html>
